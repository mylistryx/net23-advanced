volumes:
  mysql:
    name: mysql
    driver: local

  mysql-test:
    name: mysql-test
    driver: local

  redis:
    name: redis
    driver: local

services:

  application:
    container_name: application
    image: yiisoftware/yii2-php:8.5-fpm-nginx
    ports:
      - "80:80"
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    links:
      - mysql
      - redis

  redis:
    container_name: redis
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis:/data

  mysql:
    container_name: mysql
    hostname: mysql
    image: mysql:9.6
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret_root_password
      - MYSQL_DATABASE=yii2advanced
      - MYSQL_USER=user
      - MYSQL_PASSWORD=secret_user_password
    volumes:
      - mysql:/var/lib/mysql
      - ./docker/mysql/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  mysql-test:
    container_name: mysql-test
    hostname: mysql-test
    image: mysql:9.6
    ports:
      - "33006:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret_root_password
      - MYSQL_DATABASE=yii2advanced
      - MYSQL_USER=user
      - MYSQL_PASSWORD=secret_user_password
    volumes:
      - mysql-test:/var/lib/mysql
      - ./docker/mysql/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d